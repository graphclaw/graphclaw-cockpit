networks:
  # Attach to the graphclaw backend stack's network so nginx can resolve
  # the `gateway` hostname and e2e runners can reach db/minio directly.
  # Start the backend first: cd ../graphclaw && docker compose -f docker/docker-compose.yml up -d
  default:
    external: true
    name: docker_default

services:
  # ─── Cockpit Frontend ───
  cockpit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_ENABLE_DEV_AUTH: ${VITE_ENABLE_DEV_AUTH:-true}
        VITE_LOG_LEVEL: ${VITE_LOG_LEVEL:-debug}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Playwright E2E Runner (on-demand) ───
  # Run: docker compose --profile test run --rm e2e
  e2e:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    profiles:
      - test
    depends_on:
      cockpit:
        condition: service_healthy
    working_dir: /app
    volumes:
      - .:/app
    environment:
      BASE_URL: http://cockpit:3000
      API_URL: http://gateway:8000
      CI: "true"
    command: ["npx", "playwright", "test", "--reporter=html"]

