<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" width="28" height="28">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="28" height="28" rx="6" fill="url(#bg)"/>
  <!-- Graph node cluster: 3 nodes + 2 edges forming a mini task-graph -->
  <circle cx="9" cy="10" r="2.8" fill="white" opacity="0.95"/>
  <circle cx="19" cy="8" r="2.8" fill="white" opacity="0.95"/>
  <circle cx="14" cy="19" r="2.8" fill="white" opacity="0.95"/>
  <!-- Edges connecting nodes -->
  <line x1="11.2" y1="11.2" x2="12.5" y2="17" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <line x1="17.5" y1="9.8" x2="15.8" y2="17" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
  <line x1="11.6" y1="9.2" x2="16.4" y2="8.4" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
</svg>
