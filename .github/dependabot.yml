version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "area:infra"
    commit-message:
      prefix: "chore(deps)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      routine-updates:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "area:infra"
    commit-message:
      prefix: "chore(deps)"
    groups:
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      routine-updates:
        applies-to: version-updates
        patterns:
          - "*"
