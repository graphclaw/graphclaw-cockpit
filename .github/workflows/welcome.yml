name: welcome

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Thanks for opening your first issue in GraphClaw Cockpit. A maintainer will triage it soon."
          pr-message: "Thanks for your first pull request in GraphClaw Cockpit. Please make sure PR title and DCO requirements are satisfied."
