# Conventional PR Title — blocks merge if title does not follow Conventional Commits.
# Squash-merge uses the PR title as the commit message; release-please depends on this.
name: conventional-title

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  lint-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            revert
            docs
            build
            ci
            chore
            style
            refactor
            test
          requireScope: false
          subjectPattern: ^[A-Za-z0-9].+$
          subjectPatternError: |
            The subject "{subject}" found in the PR title "{title}" must start with
            an alphanumeric character.
