name: dco

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify DCO sign-off
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const { owner, repo } = context.repo;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const missing = commits
              .filter((commit) => !/Signed-off-by:\s+.+<.+>/i.test(commit.commit.message))
              .map((commit) => `${commit.sha.slice(0, 7)} ${commit.commit.message.split('\n')[0]}`);

            if (missing.length > 0) {
              core.setFailed(`Missing DCO sign-off on ${missing.length} commit(s):\n${missing.join("\n")}`);
            }
