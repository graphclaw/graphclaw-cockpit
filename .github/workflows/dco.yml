name: dco

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - name: Verify DCO sign-off
        uses: dcoapp/action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
