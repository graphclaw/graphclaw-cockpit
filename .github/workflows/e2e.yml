name: Playwright E2E (On-Demand)

on:
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'run-e2e')
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Checkout backend (graphclaw)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/graphclaw
          path: ../graphclaw
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Start Docker Compose stack
        run: docker compose --profile test up -d --build
      - name: Wait for stack to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 5
          done
      - name: Seed reference data
        run: npm run seed
      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8000
      - name: Teardown seed data
        if: always()
        run: npm run teardown
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Stop Docker Compose stack
        if: always()
        run: docker compose --profile test down