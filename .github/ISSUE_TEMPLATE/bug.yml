name: Bug Report
description: Report a reproducible defect.
title: "bug: "
labels: ["type:bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Please provide enough detail for us to reproduce and fix the issue."
  - type: input
    id: summary
    attributes:
      label: Summary
      placeholder: Brief description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Python version, Docker version, etc.
